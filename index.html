<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffcc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AstraX - Futuristic AI</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h1>AstraX</h1>
            </div>
            <button onclick="newChat()" class="new-chat-btn">+ New Chat</button>
            
            <div class="section">
                <h3>Recent Chats</h3>
                <div id="recent-chats" class="chat-list"></div>
            </div>
            
            <div class="section">
                <h3>Memory</h3>
                <div id="memory-list" class="memory-list"></div>
                <button onclick="addMemory()">Add to Memory</button>
            </div>
            
            <div class="account-section">
                <button onclick="showAccountModal()">Account</button>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <h2>AstraX</h2>
                <div class="status">Online • Powered by Advanced Neural Nets</div>
            </div>
            
            <div id="chat-messages" class="messages"></div>
            
            <!-- Input Area -->
            <div class="input-area">
                <button onclick="toggleVoiceInput()" class="mic-btn">🎤</button>
                <input type="text" id="user-input" placeholder="Message AstraX..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="uploadFile()" class="upload-btn">📎</button>
                <button onclick="sendMessage()" class="send-btn">➤</button>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div class="right-panel">
            <h3>AI Tools</h3>
            <button onclick="generateImage()">Generate Image</button>
            <button onclick="editImage()">Edit Image</button>
            <div id="image-preview" class="image-preview"></div>
        </div>
    </div>
    
    <!-- Account Modal -->
    <div id="account-modal" class="modal">
        <div class="modal-content">
            <h2>Account</h2>
            <input type="text" id="username" placeholder="Username">
            <button onclick="createAccount()">Create Account / Login</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <footer class="footer">
        Powered by ♣︎leoskyler♣︎
    </footer>
    
    <script src="app.js"></script>
</body>
</html>
